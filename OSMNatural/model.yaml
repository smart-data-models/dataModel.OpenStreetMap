OSMNatural:
  description: A natural feature from OpenStreetMap tagged with natural=*. Describes geographical features such as water bodies, woods, scrub, peaks, beaches, etc
  properties:
    address:
      description: The mailing address
      properties:
        addressCountry:
          description: The country. For example, Spain
          type: string
          x-ngsi:
            model: https://schema.org/addressCountry
            type: Property
        addressLocality:
          description: The locality in which the street address is, and which is in the region
          type: string
          x-ngsi:
            model: https://schema.org/addressLocality
            type: Property
        addressRegion:
          description: The region in which the locality is, and which is in the country
          type: string
          x-ngsi:
            model: https://schema.org/addressRegion
            type: Property
        district:
          description: A district is a type of administrative division that, in some countries, is managed by the local government
          type: string
          x-ngsi:
            type: Property
        postOfficeBoxNumber:
          description: The post office box number for PO box addresses. For example, 03578
          type: string
          x-ngsi:
            model: https://schema.org/postOfficeBoxNumber
            type: Property
        postalCode:
          description: The postal code. For example, 24004
          type: string
          x-ngsi:
            model: https://schema.org/https://schema.org/postalCode
            type: Property
        streetAddress:
          description: The street address
          type: string
          x-ngsi:
            model: https://schema.org/streetAddress
            type: Property
        streetNr:
          description: Number identifying a specific property on a public street
          type: string
          x-ngsi:
            type: Property
      type: object
      x-ngsi:
        model: https://schema.org/address
        type: Property
    alternateName:
      description: An alternative name for this item
      type: string
      x-ngsi:
        type: Property
    areaServed:
      description: The geographic area where a service or offered item is provided
      type: string
      x-ngsi:
        model: https://schema.org/Text
        type: Property
    dataProvider:
      description: A sequence of characters identifying the provider of the harmonised data entity
      type: string
      x-ngsi:
        type: Property
    dateCreated:
      description: Entity creation timestamp. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    dateModified:
      description: Timestamp of the last modification of the entity. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    description:
      description: A description of this item
      type: string
      x-ngsi:
        type: Property
    elevation:
      description: Elevation (ele) of the feature in metres above sea level, typically for peaks
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:ele
        type: Property
    id:
      anyOf:
        - description: Identifier format of any NGSI entity
          maxLength: 256
          minLength: 1
          pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
          type: string
          x-ngsi:
            type: Property
        - description: Identifier format of any NGSI entity
          format: uri
          type: string
          x-ngsi:
            type: Property
      description: Unique identifier of the entity
      x-ngsi:
        type: Relationship
    leafCycle:
      description: The leaf cycle of trees or woods
      enum:
        - deciduous
        - evergreen
        - mixed
        - semi_deciduous
        - semi_evergreen
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:leaf_cycle
        type: Property
    leafType:
      description: The leaf type of trees or woods
      enum:
        - broadleaved
        - needleleaved
        - mixed
        - leafless
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:leaf_type
        type: Property
    location:
      description: Geojson reference to the item. It can be Point, LineString, Polygon, MultiPoint, MultiLineString or MultiPolygon
      oneOf:
        - description: Geojson reference to the item. Point
          properties:
            bbox:
              description: BBox of the  Point
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Point
              items:
                type: number
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Point
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Point
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. LineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the LineString
              items:
                items:
                  type: number
                minItems: 2
                type: array
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - LineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON LineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. Polygon
          properties:
            bbox:
              description: BBox coordinates of the Polygon
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Polygon
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 4
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Polygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Polygon
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiPoint
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MulitPoint
              items:
                items:
                  type: number
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPoint
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPoint
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MultiLineString
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiLineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiLineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              items:
                type: number
              minItems: 4
              type: array
            coordinates:
              description: Coordinates of the MultiPolygon
              items:
                items:
                  items:
                    items:
                      type: number
                    minItems: 2
                    type: array
                  minItems: 4
                  type: array
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPolygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPolygon
          type: object
          x-ngsi:
            type: GeoProperty
      x-ngsi:
        type: GeoProperty
    name:
      description: The name of this item
      type: string
      x-ngsi:
        type: Property
    naturalType:
      description: The OSM natural tag classifying the geological or physical feature. Enum:'water, wood, tree, scrub, heath, grassland, peak, ridge, bare_rock, sand, beach, coastline, spring, cave_entrance, wetland...'
      enum:
        - water
        - wood
        - tree
        - tree_row
        - scrub
        - heath
        - grassland
        - fell
        - bare_rock
        - scree
        - shingle
        - sand
        - beach
        - coastline
        - bay
        - strait
        - cape
        - cliff
        - ridge
        - peak
        - volcano
        - valley
        - spring
        - cave_entrance
        - glacier
        - wetland
        - mud
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:natural
        type: Property
    osmId:
      description: The original OpenStreetMap element integer identifier
      type: number
      x-ngsi:
        type: Property
    osmLastModified:
      description: Timestamp of the last modification
      format: date-time
      type: string
      x-ngsi:
        type: Property
    osmType:
      description: The type of the original OSM element
      enum:
        - node
        - way
        - relation
      type: string
      x-ngsi:
        type: Property
    owner:
      description: A List containing a JSON encoded sequence of characters referencing the unique Ids of the owner(s)
      items:
        anyOf:
          - description: Identifier format of any NGSI entity
            maxLength: 256
            minLength: 1
            pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
            type: string
            x-ngsi:
              type: Property
          - description: Identifier format of any NGSI entity
            format: uri
            type: string
            x-ngsi:
              type: Property
        description: Unique identifier of the entity
        x-ngsi:
          type: Relationship
      type: array
      x-ngsi:
        type: Property
    seeAlso:
      description: List of URIs pointing to additional resources
      oneOf:
        - items:
            format: uri
            type: string
          minItems: 1
          type: array
        - format: uri
          type: string
      x-ngsi:
        type: Property
    source:
      description: A sequence of characters giving the original source of the entity data as a URL. Recommended to be the fully qualified domain name of the source provider, or the URL to the source object
      type: string
      x-ngsi:
        type: Property
    type:
      description: NGSI Entity type. It has to be OSMNatural
      enum:
        - OSMNatural
      type: string
      x-ngsi:
        type: Property
    water:
      description: Type of water body if natural=water (e.g. lake, reservoir, river, pond)
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:water
        type: Property
    wetland:
      description: Type of wetland if natural=wetland (e.g. swamp, bog, marsh)
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:wetland
        type: Property
  required:
    - id
    - type
    - location
    - osmId
    - osmType
    - naturalType
  type: object
  x-derived-from: https://wiki.openstreetmap.org/wiki/Key:natural
  x-disclaimer: Redistribution and use in source and binary forms...
  x-license-url: https://github.com/smart-data-models/dataModel.OpenStreetMap/blob/master/OSMNatural/LICENSE.md
  x-model-schema: https://smart-data-models.github.io/dataModel.OpenStreetMap/OSMNatural/schema.json
  x-model-tags: OSM OpenStreetMap Environment Natural
  x-version: 0.0.1