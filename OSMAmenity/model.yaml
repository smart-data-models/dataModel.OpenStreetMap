OSMAmenity:
  description: A facility or amenity from OpenStreetMap tagged with amenity=*. Represents places of public or private use such as restaurants, schools, hospitals, banks, etc
  properties:
    address:
      description: Address of the amenity, structured following schema.org PostalAddress
      properties:
        addressCity:
          description: City of the address
          type: string
          x-ngsi:
            type: Property
        addressCountry:
          description: ISO 3166-1 alpha-2 country code
          type: string
          x-ngsi:
            type: Property
        houseNumber:
          description: House or building number
          type: string
          x-ngsi:
            type: Property
        postalCode:
          description: Postal code
          type: string
          x-ngsi:
            type: Property
        streetAddress:
          description: Street name
          type: string
          x-ngsi:
            type: Property
      type: object
      x-ngsi:
        type: Property
    alternateName:
      description: An alternative name for this item
      type: string
      x-ngsi:
        type: Property
    amenityType:
      description: The OSM amenity tag classifying the facility. Enum:'restaurant, cafe, bar, fast_food, pub, ice_cream, biergarten, food_court, school, kindergarten, university, college, library, music_school, driving_school, hospital, clinic, pharmacy, doctors, dentist, veterinary, bank, atm, bureau_de_change, post_office, police, fire_station, place_of_worship, courthouse, townhall, fuel, parking, bicycle_parking, car_sharing, bus_station, taxi, toilets, bench, drinking_water, fountain, waste_basket, waste_disposal, recycling'
      enum:
        - restaurant
        - cafe
        - bar
        - fast_food
        - pub
        - ice_cream
        - biergarten
        - food_court
        - school
        - kindergarten
        - university
        - college
        - library
        - music_school
        - driving_school
        - hospital
        - clinic
        - pharmacy
        - doctors
        - dentist
        - veterinary
        - bank
        - atm
        - bureau_de_change
        - post_office
        - police
        - fire_station
        - place_of_worship
        - courthouse
        - townhall
        - fuel
        - parking
        - bicycle_parking
        - car_sharing
        - bus_station
        - taxi
        - toilets
        - bench
        - drinking_water
        - fountain
        - waste_basket
        - waste_disposal
        - recycling
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:amenity
        type: Property
    areaServed:
      description: The geographic area where a service or offered item is provided
      type: string
      x-ngsi:
        model: https://schema.org/Text
        type: Property
    capacity:
      description: Maximum capacity of people for the amenity
      minimum: 0
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:capacity
        type: Property
    cuisine:
      description: Type of food served
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:cuisine
        type: Property
    dataProvider:
      description: A sequence of characters identifying the provider of the harmonised data entity
      type: string
      x-ngsi:
        type: Property
    dateCreated:
      description: Entity creation timestamp. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    dateModified:
      description: Timestamp of the last modification of the entity. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    delivery:
      description: Indicates if the facility offers delivery service
      type: boolean
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:delivery
        type: Property
    description:
      description: A description of this item
      type: string
      x-ngsi:
        type: Property
    fee:
      description: Indicates whether a fee must be paid to use or enter the amenity
      type: boolean
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:fee
        type: Property
    id:
      anyOf:
        - description: Identifier format of any NGSI entity
          maxLength: 256
          minLength: 1
          pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
          type: string
          x-ngsi:
            type: Property
        - description: Identifier format of any NGSI entity
          format: uri
          type: string
          x-ngsi:
            type: Property
      description: Unique identifier of the entity
      x-ngsi:
        type: Relationship
    location:
      description: Geojson reference to the item. It can be Point, LineString, Polygon, MultiPoint, MultiLineString or MultiPolygon
      oneOf:
        - description: Geojson reference to the item. Point
          properties:
            bbox:
              description: BBox of the  Point
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Point
              items:
                type: number
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Point
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Point
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. LineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the LineString
              items:
                items:
                  type: number
                minItems: 2
                type: array
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - LineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON LineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. Polygon
          properties:
            bbox:
              description: BBox coordinates of the Polygon
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Polygon
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 4
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Polygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Polygon
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiPoint
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MulitPoint
              items:
                items:
                  type: number
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPoint
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPoint
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MultiLineString
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiLineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiLineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              items:
                type: number
              minItems: 4
              type: array
            coordinates:
              description: Coordinates of the MultiPolygon
              items:
                items:
                  items:
                    items:
                      type: number
                    minItems: 2
                    type: array
                  minItems: 4
                  type: array
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPolygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPolygon
          type: object
          x-ngsi:
            type: GeoProperty
      x-ngsi:
        type: GeoProperty
    name:
      description: The name of this item
      type: string
      x-ngsi:
        type: Property
    openingHours:
      description: Opening hours of the amenity in OSM format
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:opening_hours
        type: Property
    osmId:
      description: The original OpenStreetMap element integer identifier
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Elements
        type: Property
    osmLastModified:
      description: Timestamp of the last modification of the OSM element
      format: date-time
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Elements
        type: Property
    osmType:
      description: The type of the original OpenStreetMap element
      enum:
        - node
        - way
        - relation
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Elements
        type: Property
    outdoorSeating:
      description: Indicates if outdoor seating is available
      type: boolean
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:outdoor_seating
        type: Property
    owner:
      description: A List containing a JSON encoded sequence of characters referencing the unique Ids of the owner(s)
      items:
        anyOf:
          - description: Identifier format of any NGSI entity
            maxLength: 256
            minLength: 1
            pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
            type: string
            x-ngsi:
              type: Property
          - description: Identifier format of any NGSI entity
            format: uri
            type: string
            x-ngsi:
              type: Property
        description: Unique identifier of the entity
        x-ngsi:
          type: Relationship
      type: array
      x-ngsi:
        type: Property
    phone:
      description: Phone number for the amenity
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:phone
        type: Property
    seeAlso:
      description: List of URIs pointing to additional resources about this item
      oneOf:
        - items:
            format: uri
            type: string
          minItems: 1
          type: array
        - format: uri
          type: string
      x-ngsi:
        type: Property
    source:
      description: A sequence of characters giving the original source of the entity data as a URL. Recommended to be the fully qualified domain name of the source provider, or the URL to the source object
      type: string
      x-ngsi:
        type: Property
    takeaway:
      description: Indicates if the food establishment offers takeaway
      enum:
        - 'yes'
        - 'no'
        - only
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:takeaway
        type: Property
    type:
      description: NGSI Entity type. It has to be OSMAmenity
      enum:
        - OSMAmenity
      type: string
      x-ngsi:
        type: Property
    website:
      description: Official website URL
      format: uri
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:website
        type: Property
    wheelchair:
      description: Wheelchair accessibility
      enum:
        - 'yes'
        - 'no'
        - limited
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:wheelchair
        type: Property
  required:
    - id
    - type
    - location
    - osmId
    - osmType
    - amenityType
  type: object
  x-derived-from: https://wiki.openstreetmap.org/wiki/Key:amenity
