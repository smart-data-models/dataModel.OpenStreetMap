OSMBuilding:
  description: A building or group of connected buildings from OpenStreetMap tagged with building=*. Represents the physical structure of a building, including its geometry, dimensions, materials, and functional classification. For specific functions within a building (shop, amenity, etc.) additional entities should be used.
  properties:
    access:
      description: General access restriction to the building
      enum:
        - 'yes'
        - 'no'
        - private
        - permissive
        - customers
        - destination
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:access
        type: Property
    address:
      description: Address of the building, structured following schema.org PostalAddress.
      properties:
        addressCity:
          description: 'City. OSM: addr:city'
          type: string
          x-ngsi:
            type: Property
        addressCountry:
          description: 'ISO 3166-1 alpha-2 country code. OSM: addr:country'
          type: string
          x-ngsi:
            type: Property
        houseNumber:
          description: 'House or building number. OSM: addr:housenumber'
          type: string
          x-ngsi:
            type: Property
        postalCode:
          description: 'Postal code. OSM: addr:postcode'
          type: string
          x-ngsi:
            type: Property
        streetAddress:
          description: 'Street name. OSM: addr:street'
          type: string
          x-ngsi:
            type: Property
      type: object
      x-ngsi:
        type: Property
    alternateName:
      description: An alternative name for this item
      type: string
      x-ngsi:
        type: Property
    amenity:
      description: Primary amenity function of the building (e.g. hospital, school)
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:amenity
        type: Property
    areaServed:
      description: The geographic area where a service or offered item is provided
      type: string
      x-ngsi:
        model: https://schema.org/Text
        type: Property
    buildingColour:
      description: Colour of the main facade, expressed as a CSS colour name or hex code
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:building:colour
        type: Property
    buildingHeight:
      description: Total height of the building in metres from ground to highest point
      minimum: 0
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:height
        type: Property
        units: m
    buildingLevels:
      description: Number of above-ground floors in the building
      minimum: 0
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:building:levels
        type: Property
    buildingLevelsUnderground:
      description: Number of underground or basement floors in the building
      minimum: 0
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:building:levels:underground
        type: Property
    buildingMaterial:
      description: Primary structural or facade material of the building
      enum:
        - brick
        - concrete
        - wood
        - glass
        - steel
        - stone
        - plaster
        - metal
        - timber_framing
        - clay
        - sand
        - adobe
        - granite
        - limestone
        - marble
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:building:material
        type: Property
    buildingType:
      description: The OSM building tag value classifying the type or function of the building. Enum:'yes, residential, apartments, house, detached, bungalow, cabin, dormitory, hotel, commercial, office, industrial, warehouse, retail, supermarket, school, university, hospital, church, cathedral, mosque, synagogue, civic, government, public, transportation, train_station, stadium, garage, shed, greenhouse, service, ruins'
      enum:
        - 'yes'
        - residential
        - apartments
        - house
        - detached
        - bungalow
        - cabin
        - dormitory
        - hotel
        - ger
        - barracks
        - annexe
        - farm
        - farm_auxiliary
        - barn
        - commercial
        - office
        - industrial
        - warehouse
        - retail
        - supermarket
        - kiosk
        - school
        - university
        - hospital
        - clinic
        - church
        - cathedral
        - mosque
        - synagogue
        - temple
        - chapel
        - civic
        - government
        - public
        - transportation
        - train_station
        - stadium
        - grandstand
        - sports_hall
        - garage
        - garages
        - shed
        - greenhouse
        - conservatory
        - service
        - shed
        - roof
        - ruins
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:building
        type: Property
    dataProvider:
      description: A sequence of characters identifying the provider of the harmonised data entity
      type: string
      x-ngsi:
        type: Property
    dateCreated:
      description: Entity creation timestamp. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    dateModified:
      description: Timestamp of the last modification of the entity. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    description:
      description: A description of this item
      type: string
      x-ngsi:
        type: Property
    flats:
      description: Total number of individual dwelling units within the building
      minimum: 0
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:building:flats
        type: Property
    id:
      anyOf:
        - description: Identifier format of any NGSI entity
          maxLength: 256
          minLength: 1
          pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
          type: string
          x-ngsi:
            type: Property
        - description: Identifier format of any NGSI entity
          format: uri
          type: string
          x-ngsi:
            type: Property
      description: Unique identifier of the entity
      x-ngsi:
        type: Relationship
    location:
      description: Geojson reference to the item. It can be Point, LineString, Polygon, MultiPoint, MultiLineString or MultiPolygon
      oneOf:
        - description: Geojson reference to the item. Point
          properties:
            bbox:
              description: BBox of the  Point
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Point
              items:
                type: number
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Point
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Point
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. LineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the LineString
              items:
                items:
                  type: number
                minItems: 2
                type: array
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - LineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON LineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. Polygon
          properties:
            bbox:
              description: BBox coordinates of the Polygon
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Polygon
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 4
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Polygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Polygon
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiPoint
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MulitPoint
              items:
                items:
                  type: number
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPoint
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPoint
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MultiLineString
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiLineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiLineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              items:
                type: number
              minItems: 4
              type: array
            coordinates:
              description: Coordinates of the MultiPolygon
              items:
                items:
                  items:
                    items:
                      type: number
                    minItems: 2
                    type: array
                  minItems: 4
                  type: array
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPolygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPolygon
          type: object
          x-ngsi:
            type: GeoProperty
      x-ngsi:
        type: GeoProperty
    minHeight:
      description: Height of the base of the building above ground level in metres, used for buildings on slopes or elevated structures
      minimum: 0
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:min_height
        type: Property
        units: m
    name:
      description: The name of this item
      type: string
      x-ngsi:
        type: Property
    openingHours:
      description: Opening hours of the building or its primary function in OSM opening_hours syntax
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:opening_hours
        type: Property
    operator:
      description: Name of the entity operating or managing the building
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:operator
        type: Property
    osmId:
      description: The original OpenStreetMap element integer identifier
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Elements
        type: Property
    osmLastModified:
      description: Timestamp of the last modification of the OSM element.
      format: date-time
      type: string
      x-ngsi:
        type: Property
    osmType:
      description: The type of the original OpenStreetMap element
      enum:
        - node
        - way
        - relation
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Elements
        type: Property
    owner:
      description: A List containing a JSON encoded sequence of characters referencing the unique Ids of the owner(s)
      items:
        anyOf:
          - description: Identifier format of any NGSI entity
            maxLength: 256
            minLength: 1
            pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
            type: string
            x-ngsi:
              type: Property
          - description: Identifier format of any NGSI entity
            format: uri
            type: string
            x-ngsi:
              type: Property
        description: Unique identifier of the entity
        x-ngsi:
          type: Relationship
      type: array
      x-ngsi:
        type: Property
    roofColour:
      description: Colour of the roof, expressed as a CSS colour name or hex code
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:roof:colour
        type: Property
    roofMaterial:
      description: Primary material of the roof surface
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:roof:material
        type: Property
    roofShape:
      description: Shape of the roof. Enum:'flat, gabled, hipped, half-hipped, pyramidal, gambrel, mansard, dome, skillion, round, saltbox, onion, cone'
      enum:
        - flat
        - gabled
        - hipped
        - half-hipped
        - pyramidal
        - gambrel
        - mansard
        - dome
        - skillion
        - round
        - saltbox
        - onion
        - cone
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:roof:shape
        type: Property
    seeAlso:
      description: List of URIs pointing to additional resources about this item.
      oneOf:
        - items:
            format: uri
            type: string
          minItems: 1
          type: array
        - format: uri
          type: string
      x-ngsi:
        type: Property
    source:
      description: A sequence of characters giving the original source of the entity data as a URL. Recommended to be the fully qualified domain name of the source provider, or the URL to the source object
      type: string
      x-ngsi:
        type: Property
    startDate:
      description: Year or date when the building was constructed. Free-form date or year value
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:start_date
        type: Property
    type:
      description: NGSI Entity type. It has to be OSMBuilding
      enum:
        - OSMBuilding
      type: string
      x-ngsi:
        type: Property
    wheelchair:
      description: Level of wheelchair accessibility of the building
      enum:
        - 'yes'
        - 'no'
        - limited
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:wheelchair
        type: Property
  required:
    - id
    - type
    - location
    - osmId
    - osmType
    - buildingType
  type: object
  x-derived-from: https://wiki.openstreetmap.org/wiki/Key:building
  x-disclaimer: Redistribution and use in source and binary forms...
  x-license-url: https://github.com/smart-data-models/dataModel.OpenStreetMap/blob/master/OSMBuilding/LICENSE.md
  x-model-schema: https://smart-data-models.github.io/dataModel.OpenStreetMap/OSMBuilding/schema.json
  x-model-tags: OSM OpenStreetMap Buildings
  x-version: 0.0.1