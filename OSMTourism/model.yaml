OSMTourism:
  description: A tourist attraction or tourism-related facility from OpenStreetMap tagged with tourism=*. Includes hotels, museums, viewpoints, artworks, etc
  properties:
    address:
      description: Address of the amenity, structured following schema.org PostalAddress
      properties:
        addressCity:
          description: City of the address
          type: string
          x-ngsi:
            type: Property
        addressCountry:
          description: ISO 3166-1 alpha-2 country code
          type: string
          x-ngsi:
            type: Property
        houseNumber:
          description: House or building number
          type: string
          x-ngsi:
            type: Property
        postalCode:
          description: Postal code
          type: string
          x-ngsi:
            type: Property
        streetAddress:
          description: Street name
          type: string
          x-ngsi:
            type: Property
      type: object
      x-ngsi:
        type: Property
    alternateName:
      description: An alternative name for this item
      type: string
      x-ngsi:
        type: Property
    areaServed:
      description: The geographic area where a service or offered item is provided
      type: string
      x-ngsi:
        model: https://schema.org/Text
        type: Property
    artworkType:
      description: Specific type of artwork if tourism=artwork
      enum:
        - sculpture
        - statue
        - mural
        - bust
        - architecture
        - graffiti
        - installation
        - painting
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:artwork_type
        type: Property
    dataProvider:
      description: A sequence of characters identifying the provider of the harmonised data entity
      type: string
      x-ngsi:
        type: Property
    dateCreated:
      description: Entity creation timestamp. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    dateModified:
      description: Timestamp of the last modification of the entity. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    description:
      description: A description of this item
      type: string
      x-ngsi:
        type: Property
    fee:
      description: Indicates whether an entrance fee is required
      type: boolean
      x-ngsi:
        type: Property
    id:
      anyOf:
        - description: Identifier format of any NGSI entity
          maxLength: 256
          minLength: 1
          pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
          type: string
          x-ngsi:
            type: Property
        - description: Identifier format of any NGSI entity
          format: uri
          type: string
          x-ngsi:
            type: Property
      description: Unique identifier of the entity
      x-ngsi:
        type: Relationship
    information:
      description: Type of information provided if tourism=information
      enum:
        - guidepost
        - board
        - map
        - office
        - terminal
        - audioguide
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:information
        type: Property
    location:
      description: Geojson reference to the item. It can be Point, LineString, Polygon, MultiPoint, MultiLineString or MultiPolygon
      oneOf:
        - description: Geojson reference to the item. Point
          properties:
            bbox:
              description: BBox of the  Point
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Point
              items:
                type: number
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Point
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Point
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. LineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the LineString
              items:
                items:
                  type: number
                minItems: 2
                type: array
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - LineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON LineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. Polygon
          properties:
            bbox:
              description: BBox coordinates of the Polygon
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Polygon
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 4
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Polygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Polygon
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiPoint
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MulitPoint
              items:
                items:
                  type: number
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPoint
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPoint
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MultiLineString
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiLineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiLineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              items:
                type: number
              minItems: 4
              type: array
            coordinates:
              description: Coordinates of the MultiPolygon
              items:
                items:
                  items:
                    items:
                      type: number
                    minItems: 2
                    type: array
                  minItems: 4
                  type: array
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPolygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPolygon
          type: object
          x-ngsi:
            type: GeoProperty
      x-ngsi:
        type: GeoProperty
    name:
      description: The name of this item
      type: string
      x-ngsi:
        type: Property
    osmId:
      description: The original OpenStreetMap element integer identifier
      type: number
      x-ngsi:
        type: Property
    osmLastModified:
      description: Timestamp of the last modification
      format: date-time
      type: string
      x-ngsi:
        type: Property
    osmType:
      description: The type of the original OSM element
      enum:
        - node
        - way
        - relation
      type: string
      x-ngsi:
        type: Property
    owner:
      description: A List containing a JSON encoded sequence of characters referencing the unique Ids of the owner(s)
      items:
        anyOf:
          - description: Identifier format of any NGSI entity
            maxLength: 256
            minLength: 1
            pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
            type: string
            x-ngsi:
              type: Property
          - description: Identifier format of any NGSI entity
            format: uri
            type: string
            x-ngsi:
              type: Property
        description: Unique identifier of the entity
        x-ngsi:
          type: Relationship
      type: array
      x-ngsi:
        type: Property
    rooms:
      description: Number of rooms in a hotel or guest house
      minimum: 1
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:rooms
        type: Property
    seeAlso:
      description: List of URIs pointing to additional resources
      oneOf:
        - items:
            format: uri
            type: string
          minItems: 1
          type: array
        - format: uri
          type: string
      x-ngsi:
        type: Property
    source:
      description: A sequence of characters giving the original source of the entity data as a URL. Recommended to be the fully qualified domain name of the source provider, or the URL to the source object
      type: string
      x-ngsi:
        type: Property
    stars:
      description: Hotel star rating
      maximum: 5
      minimum: 1
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:stars
        type: Property
    tourismType:
      description: The OSM tourism tag classification. Enum:'hotel, motel, hostel, guest_house, chalet, apartment, camp_site, caravan_site, alpine_hut, wilderness_hut, museum, gallery, theme_park, zoo, aquarium, attraction, viewpoint, artwork, information, picnic_site'
      enum:
        - hotel
        - motel
        - hostel
        - guest_house
        - chalet
        - apartment
        - camp_site
        - caravan_site
        - alpine_hut
        - wilderness_hut
        - museum
        - gallery
        - theme_park
        - zoo
        - aquarium
        - attraction
        - viewpoint
        - artwork
        - information
        - picnic_site
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:tourism
        type: Property
    type:
      description: NGSI Entity type. It has to be OSMTourism
      enum:
        - OSMTourism
      type: string
      x-ngsi:
        type: Property
    wheelchair:
      description: Wheelchair accessibility
      enum:
        - 'yes'
        - 'no'
        - limited
      type: string
      x-ngsi:
        type: Property
  required:
    - id
    - type
    - location
    - osmId
    - osmType
    - tourismType
  type: object
  x-derived-from: https://wiki.openstreetmap.org/wiki/Key:tourism
  x-disclaimer: Redistribution and use in source and binary forms...
  x-license-url: https://github.com/smart-data-models/dataModel.OpenStreetMap/blob/master/OSMTourism/LICENSE.md
  x-model-schema: https://smart-data-models.github.io/dataModel.OpenStreetMap/OSMTourism/schema.json
  x-model-tags: OSM OpenStreetMap POI Tourism
  x-version: 0.0.1