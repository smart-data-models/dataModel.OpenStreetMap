OSMRailway:
  description: A railway track or infrastructure element from OpenStreetMap tagged with the railway key. Covers all types of rail infrastructure, from mainline heavy rail to trams, subways and funiculars.
  properties:
    address:
      description: The mailing address
      properties:
        addressCountry:
          description: The country. For example, Spain
          type: string
          x-ngsi:
            model: https://schema.org/addressCountry
            type: Property
        addressLocality:
          description: The locality in which the street address is, and which is in the region
          type: string
          x-ngsi:
            model: https://schema.org/addressLocality
            type: Property
        addressRegion:
          description: The region in which the locality is, and which is in the country
          type: string
          x-ngsi:
            model: https://schema.org/addressRegion
            type: Property
        district:
          description: A district is a type of administrative division that, in some countries, is managed by the local government
          type: string
          x-ngsi:
            type: Property
        postOfficeBoxNumber:
          description: The post office box number for PO box addresses. For example, 03578
          type: string
          x-ngsi:
            model: https://schema.org/postOfficeBoxNumber
            type: Property
        postalCode:
          description: The postal code. For example, 24004
          type: string
          x-ngsi:
            model: https://schema.org/https://schema.org/postalCode
            type: Property
        streetAddress:
          description: The street address
          type: string
          x-ngsi:
            model: https://schema.org/streetAddress
            type: Property
        streetNr:
          description: Number identifying a specific property on a public street
          type: string
          x-ngsi:
            type: Property
      type: object
      x-ngsi:
        model: https://schema.org/address
        type: Property
    alternateName:
      description: An alternative name for this item
      type: string
      x-ngsi:
        type: Property
    areaServed:
      description: The geographic area where a service or offered item is provided
      type: string
      x-ngsi:
        model: https://schema.org/Text
        type: Property
    bridge:
      description: Indicates whether this railway segment runs over a bridge
      type: boolean
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:bridge
        type: Property
    dataProvider:
      description: A sequence of characters identifying the provider of the harmonised data entity
      type: string
      x-ngsi:
        type: Property
    dateCreated:
      description: Entity creation timestamp. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    dateModified:
      description: Timestamp of the last modification of the entity. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    description:
      description: A description of this item
      type: string
      x-ngsi:
        type: Property
    electrified:
      description: Method of electrification of the railway
      enum:
        - contact_line
        - rail
        - 'yes'
        - 'no'
        - 4_rail
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:electrified
        type: Property
    frequency:
      description: Electrical frequency of the traction current in Hertz
      minimum: 0
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:frequency
        type: Property
        units: Hz
    gauge:
      description: Track gauge in millimetres (distance between the two rails)
      minimum: 0
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:gauge
        type: Property
        units: mm
    id:
      anyOf:
        - description: Identifier format of any NGSI entity
          maxLength: 256
          minLength: 1
          pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
          type: string
          x-ngsi:
            type: Property
        - description: Identifier format of any NGSI entity
          format: uri
          type: string
          x-ngsi:
            type: Property
      description: Unique identifier of the entity
      x-ngsi:
        type: Relationship
    layer:
      description: Vertical layer relative to other features at the same location
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:layer
        type: Property
    location:
      description: Geojson reference to the item. It can be Point, LineString, Polygon, MultiPoint, MultiLineString or MultiPolygon
      oneOf:
        - description: Geojson reference to the item. Point
          properties:
            bbox:
              description: BBox of the  Point
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Point
              items:
                type: number
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Point
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Point
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. LineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the LineString
              items:
                items:
                  type: number
                minItems: 2
                type: array
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - LineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON LineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. Polygon
          properties:
            bbox:
              description: BBox coordinates of the Polygon
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Polygon
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 4
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Polygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Polygon
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiPoint
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MulitPoint
              items:
                items:
                  type: number
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPoint
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPoint
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MultiLineString
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiLineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiLineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              items:
                type: number
              minItems: 4
              type: array
            coordinates:
              description: Coordinates of the MultiPolygon
              items:
                items:
                  items:
                    items:
                      type: number
                    minItems: 2
                    type: array
                  minItems: 4
                  type: array
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPolygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPolygon
          type: object
          x-ngsi:
            type: GeoProperty
      x-ngsi:
        type: GeoProperty
    maxSpeed:
      description: Maximum permitted speed on this track in kilometres per hour
      minimum: 0
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:maxspeed
        type: Property
        units: Km/h
    name:
      description: The name of this item
      type: string
      x-ngsi:
        type: Property
    operator:
      description: Name of the railway operator or company
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:operator
        type: Property
    osmId:
      description: The original OpenStreetMap element integer identifier
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Elements
        type: Property
    osmLastModified:
      description: Timestamp of the last modification of the OSM element.
      format: date-time
      type: string
      x-ngsi:
        type: Property
    osmType:
      description: The type of the original OpenStreetMap element
      enum:
        - node
        - way
        - relation
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Elements
        type: Property
    owner:
      description: A List containing a JSON encoded sequence of characters referencing the unique Ids of the owner(s)
      items:
        anyOf:
          - description: Identifier format of any NGSI entity
            maxLength: 256
            minLength: 1
            pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
            type: string
            x-ngsi:
              type: Property
          - description: Identifier format of any NGSI entity
            format: uri
            type: string
            x-ngsi:
              type: Property
        description: Unique identifier of the entity
        x-ngsi:
          type: Relationship
      type: array
      x-ngsi:
        type: Property
    railwayType:
      description: The OSM railway tag value that classifies the type of rail infrastructure. Enum:'rail, subway, tram, light_rail, narrow_gauge, monorail, funicular, miniature, preserved, disused, abandoned, construction, proposed'
      enum:
        - rail
        - subway
        - tram
        - light_rail
        - narrow_gauge
        - monorail
        - funicular
        - miniature
        - preserved
        - disused
        - abandoned
        - construction
        - proposed
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:railway
        type: Property
    ref:
      description: Official line reference number or code
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:ref
        type: Property
    seeAlso:
      description: List of URIs pointing to additional resources about this item.
      oneOf:
        - items:
            format: uri
            type: string
          minItems: 1
          type: array
        - format: uri
          type: string
      x-ngsi:
        type: Property
    service:
      description: Type of service track, if not part of the main running line
      enum:
        - spur
        - yard
        - siding
        - crossover
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:service
        type: Property
    source:
      description: A sequence of characters giving the original source of the entity data as a URL. Recommended to be the fully qualified domain name of the source provider, or the URL to the source object
      type: string
      x-ngsi:
        type: Property
    tracks:
      description: Number of parallel tracks
      minimum: 1
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:tracks
        type: Property
    tunnel:
      description: Indicates whether this railway segment runs through a tunnel
      type: boolean
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:tunnel
        type: Property
    type:
      description: NGSI Entity type. It has to be OSMRailway
      enum:
        - OSMRailway
      type: string
      x-ngsi:
        type: Property
    usage:
      description: Intended usage of the railway line
      enum:
        - main
        - branch
        - industrial
        - military
        - tourism
        - test
        - scientific
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:usage
        type: Property
    voltage:
      description: Electrical voltage used for traction in Volts
      minimum: 0
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:voltage
        type: Property
        units: V
  required:
    - id
    - type
    - location
    - osmId
    - osmType
    - railwayType
  type: object
  x-derived-from: https://wiki.openstreetmap.org/wiki/Key:railway
  x-disclaimer: Redistribution and use in source and binary forms...
  x-license-url: https://github.com/smart-data-models/dataModel.OpenStreetMap/blob/master/OSMRailway/LICENSE.md
  x-model-schema: https://smart-data-models.github.io/dataModel.OpenStreetMap/OSMRailway/schema.json
  x-model-tags: OSM OpenStreetMap Transportation Railway
  x-version: 0.0.1