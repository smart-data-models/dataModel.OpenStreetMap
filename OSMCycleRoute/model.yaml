OSMCycleRoute:
  description: A dedicated cycling infrastructure element from OpenStreetMap. Represents cycle paths, shared cycle lanes, and bike routes tagged with highway=cycleway or cycleway=* on road ways.
  properties:
    access:
      description: Access restriction applying to cyclists on this route
      enum:
        - 'yes'
        - 'no'
        - private
        - permissive
        - destination
        - designated
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:access
        type: Property
    address:
      description: The mailing address
      properties:
        addressCountry:
          description: The country. For example, Spain
          type: string
          x-ngsi:
            model: https://schema.org/addressCountry
            type: Property
        addressLocality:
          description: The locality in which the street address is, and which is in the region
          type: string
          x-ngsi:
            model: https://schema.org/addressLocality
            type: Property
        addressRegion:
          description: The region in which the locality is, and which is in the country
          type: string
          x-ngsi:
            model: https://schema.org/addressRegion
            type: Property
        district:
          description: A district is a type of administrative division that, in some countries, is managed by the local government
          type: string
          x-ngsi:
            type: Property
        postOfficeBoxNumber:
          description: The post office box number for PO box addresses. For example, 03578
          type: string
          x-ngsi:
            model: https://schema.org/postOfficeBoxNumber
            type: Property
        postalCode:
          description: The postal code. For example, 24004
          type: string
          x-ngsi:
            model: https://schema.org/https://schema.org/postalCode
            type: Property
        streetAddress:
          description: The street address
          type: string
          x-ngsi:
            model: https://schema.org/streetAddress
            type: Property
        streetNr:
          description: Number identifying a specific property on a public street
          type: string
          x-ngsi:
            type: Property
      type: object
      x-ngsi:
        model: https://schema.org/address
        type: Property
    alternateName:
      description: An alternative name for this item
      type: string
      x-ngsi:
        type: Property
    areaServed:
      description: The geographic area where a service or offered item is provided
      type: string
      x-ngsi:
        model: https://schema.org/Text
        type: Property
    cyclewayType:
      description: Classification of the cycling infrastructure. Enum:'lane, track, opposite, opposite_lane, shared_busway, path, separate, shared'
      enum:
        - lane
        - track
        - opposite
        - opposite_lane
        - shared_busway
        - path
        - separate
        - shared
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:cycleway
        type: Property
    dataProvider:
      description: A sequence of characters identifying the provider of the harmonised data entity
      type: string
      x-ngsi:
        type: Property
    dateCreated:
      description: Entity creation timestamp. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    dateModified:
      description: Timestamp of the last modification of the entity. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    description:
      description: A description of this item
      type: string
      x-ngsi:
        type: Property
    id:
      anyOf:
        - description: Identifier format of any NGSI entity
          maxLength: 256
          minLength: 1
          pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
          type: string
          x-ngsi:
            type: Property
        - description: Identifier format of any NGSI entity
          format: uri
          type: string
          x-ngsi:
            type: Property
      description: Unique identifier of the entity
      x-ngsi:
        type: Relationship
    lit:
      description: Indicates whether the cycle route has street lighting
      type: boolean
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:lit
        type: Property
    location:
      description: Geojson reference to the item. It can be Point, LineString, Polygon, MultiPoint, MultiLineString or MultiPolygon
      oneOf:
        - description: Geojson reference to the item. Point
          properties:
            bbox:
              description: BBox of the  Point
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Point
              items:
                type: number
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Point
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Point
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. LineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the LineString
              items:
                items:
                  type: number
                minItems: 2
                type: array
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - LineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON LineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. Polygon
          properties:
            bbox:
              description: BBox coordinates of the Polygon
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Polygon
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 4
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Polygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Polygon
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiPoint
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MulitPoint
              items:
                items:
                  type: number
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPoint
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPoint
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MultiLineString
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiLineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiLineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              items:
                type: number
              minItems: 4
              type: array
            coordinates:
              description: Coordinates of the MultiPolygon
              items:
                items:
                  items:
                    items:
                      type: number
                    minItems: 2
                    type: array
                  minItems: 4
                  type: array
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPolygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPolygon
          type: object
          x-ngsi:
            type: GeoProperty
      x-ngsi:
        type: GeoProperty
    maxSpeed:
      description: Maximum permitted speed in kilometres per hour
      minimum: 0
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:maxspeed
        type: Property
        units: Km/h
    name:
      description: The name of this item
      type: string
      x-ngsi:
        type: Property
    ncnRef:
      description: National Cycle Network route reference number
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:ncn_ref
        type: Property
    oneway:
      description: Indicates whether the cycle route is one-way for cyclists
      type: boolean
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:oneway
        type: Property
    operator:
      description: Name of the entity responsible for maintaining this cycle route
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:operator
        type: Property
    osmId:
      description: The original OpenStreetMap element integer identifier
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Elements
        type: Property
    osmLastModified:
      description: Timestamp of the last modification of the OSM element.
      format: date-time
      type: string
      x-ngsi:
        type: Property
    osmType:
      description: The type of the original OpenStreetMap element
      enum:
        - node
        - way
        - relation
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Elements
        type: Property
    owner:
      description: A List containing a JSON encoded sequence of characters referencing the unique Ids of the owner(s)
      items:
        anyOf:
          - description: Identifier format of any NGSI entity
            maxLength: 256
            minLength: 1
            pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
            type: string
            x-ngsi:
              type: Property
          - description: Identifier format of any NGSI entity
            format: uri
            type: string
            x-ngsi:
              type: Property
        description: Unique identifier of the entity
        x-ngsi:
          type: Relationship
      type: array
      x-ngsi:
        type: Property
    rcnRef:
      description: Regional Cycle Network route reference number
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:rcn_ref
        type: Property
    seeAlso:
      description: List of URIs pointing to additional resources about this item.
      oneOf:
        - items:
            format: uri
            type: string
          minItems: 1
          type: array
        - format: uri
          type: string
      x-ngsi:
        type: Property
    segregated:
      description: Indicates whether the cycling infrastructure is physically separated from pedestrian use
      type: boolean
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:segregated
        type: Property
    source:
      description: A sequence of characters giving the original source of the entity data as a URL. Recommended to be the fully qualified domain name of the source provider, or the URL to the source object
      type: string
      x-ngsi:
        type: Property
    surface:
      description: Physical surface material of the cycle path
      enum:
        - asphalt
        - concrete
        - gravel
        - dirt
        - paving_stones
        - cobblestone
        - unpaved
        - grass
        - compacted
        - fine_gravel
        - sand
        - ground
        - wood
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:surface
        type: Property
    type:
      description: NGSI Entity type. It has to be OSMCycleRoute
      enum:
        - OSMCycleRoute
      type: string
      x-ngsi:
        type: Property
    widthMeters:
      description: Width of the cycle path in metres
      minimum: 0
      type: number
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:width
        type: Property
        units: m
  required:
    - id
    - type
    - location
    - osmId
    - osmType
    - cyclewayType
  type: object
  x-derived-from: https://wiki.openstreetmap.org/wiki/Key:cycleway
