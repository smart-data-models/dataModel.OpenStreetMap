OSMShop:
  description: A shop or retail store from OpenStreetMap tagged with shop=*. Represents establishments selling retail products directly to end customers
  properties:
    address:
      description: Address of the Shop, structured following schema.org PostalAddress
      properties:
        addressCity:
          description: City of the address
          type: string
          x-ngsi:
            type: Property
        addressCountry:
          description: ISO 3166-1 alpha-2 country code
          type: string
          x-ngsi:
            type: Property
        houseNumber:
          description: House or building number
          type: string
          x-ngsi:
            type: Property
        postalCode:
          description: Postal code
          type: string
          x-ngsi:
            type: Property
        streetAddress:
          description: Street name
          type: string
          x-ngsi:
            type: Property
      type: object
      x-ngsi:
        type: Property
    alternateName:
      description: An alternative name for this item
      type: string
      x-ngsi:
        type: Property
    areaServed:
      description: The geographic area where a service or offered item is provided
      type: string
      x-ngsi:
        model: https://schema.org/Text
        type: Property
    brand:
      description: The brand name if the shop is part of a chain or franchise
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:brand
        type: Property
    dataProvider:
      description: A sequence of characters identifying the provider of the harmonised data entity
      type: string
      x-ngsi:
        type: Property
    dateCreated:
      description: Entity creation timestamp. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    dateModified:
      description: Timestamp of the last modification of the entity. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    description:
      description: A description of this item
      type: string
      x-ngsi:
        type: Property
    id:
      anyOf:
        - description: Identifier format of any NGSI entity
          maxLength: 256
          minLength: 1
          pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
          type: string
          x-ngsi:
            type: Property
        - description: Identifier format of any NGSI entity
          format: uri
          type: string
          x-ngsi:
            type: Property
      description: Unique identifier of the entity
      x-ngsi:
        type: Relationship
    location:
      description: Geojson reference to the item. It can be Point, LineString, Polygon, MultiPoint, MultiLineString or MultiPolygon
      oneOf:
        - description: Geojson reference to the item. Point
          properties:
            bbox:
              description: BBox of the  Point
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Point
              items:
                type: number
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Point
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Point
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. LineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the LineString
              items:
                items:
                  type: number
                minItems: 2
                type: array
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - LineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON LineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. Polygon
          properties:
            bbox:
              description: BBox coordinates of the Polygon
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Polygon
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 4
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Polygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Polygon
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiPoint
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MulitPoint
              items:
                items:
                  type: number
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPoint
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPoint
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MultiLineString
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiLineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiLineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              items:
                type: number
              minItems: 4
              type: array
            coordinates:
              description: Coordinates of the MultiPolygon
              items:
                items:
                  items:
                    items:
                      type: number
                    minItems: 2
                    type: array
                  minItems: 4
                  type: array
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPolygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPolygon
          type: object
          x-ngsi:
            type: GeoProperty
      x-ngsi:
        type: GeoProperty
    name:
      description: The name of this item
      type: string
      x-ngsi:
        type: Property
    openingHours:
      description: Opening hours of the shop in OSM format
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:opening_hours
        type: Property
    operator:
      description: Name of the entity operating the shop
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:operator
        type: Property
    organic:
      description: Indicates if the shop sells organic products
      enum:
        - 'yes'
        - 'no'
        - only
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:organic
        type: Property
    osmId:
      description: The original OpenStreetMap element integer identifier
      type: number
      x-ngsi:
        type: Property
    osmLastModified:
      description: Timestamp of the last modification
      format: date-time
      type: string
      x-ngsi:
        type: Property
    osmType:
      description: The type of the original OSM element
      enum:
        - node
        - way
        - relation
      type: string
      x-ngsi:
        type: Property
    owner:
      description: A List containing a JSON encoded sequence of characters referencing the unique Ids of the owner(s)
      items:
        anyOf:
          - description: Identifier format of any NGSI entity
            maxLength: 256
            minLength: 1
            pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
            type: string
            x-ngsi:
              type: Property
          - description: Identifier format of any NGSI entity
            format: uri
            type: string
            x-ngsi:
              type: Property
        description: Unique identifier of the entity
        x-ngsi:
          type: Relationship
      type: array
      x-ngsi:
        type: Property
    phone:
      description: Phone number for the shop
      type: string
      x-ngsi:
        type: Property
    seeAlso:
      description: List of URIs pointing to additional resources
      oneOf:
        - items:
            format: uri
            type: string
          minItems: 1
          type: array
        - format: uri
          type: string
      x-ngsi:
        type: Property
    shopType:
      description: The OSM shop tag classifying the retail category. Enum:'supermarket, convenience, bakery, clothes, shoes, hairdresser, car_repair, bicycle, hardware, electronics, florist, books...'
      enum:
        - supermarket
        - convenience
        - bakery
        - butcher
        - greengrocer
        - deli
        - clothes
        - shoes
        - boutique
        - tailor
        - jewelry
        - optician
        - cosmetics
        - hairdresser
        - beauty
        - massage
        - tattoo
        - car
        - car_repair
        - bicycle
        - hardware
        - electronics
        - mobile_phone
        - computer
        - doityourself
        - florist
        - gift
        - books
        - stationery
        - sports
        - fishing
        - outdoor
        - pet
        - toys
        - furniture
        - interior_decoration
        - laundry
        - dry_cleaning
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:shop
        type: Property
    source:
      description: A sequence of characters giving the original source of the entity data as a URL. Recommended to be the fully qualified domain name of the source provider, or the URL to the source object
      type: string
      x-ngsi:
        type: Property
    type:
      description: NGSI Entity type. It has to be OSMShop
      enum:
        - OSMShop
      type: string
      x-ngsi:
        type: Property
    website:
      description: Official website URL
      format: uri
      type: string
      x-ngsi:
        type: Property
    wheelchair:
      description: Wheelchair accessibility
      enum:
        - 'yes'
        - 'no'
        - limited
      type: string
      x-ngsi:
        model: https://wiki.openstreetmap.org/wiki/Key:wheelchair
        type: Property
  required:
    - id
    - type
    - location
    - osmId
    - osmType
    - shopType
  type: object
  x-derived-from: https://wiki.openstreetmap.org/wiki/Key:shop
  x-disclaimer: Redistribution and use in source and binary forms...
  x-license-url: https://github.com/smart-data-models/dataModel.OpenStreetMap/blob/master/OSMShop/LICENSE.md
  x-model-schema: https://smart-data-models.github.io/dataModel.OpenStreetMap/OSMShop/schema.json
  x-model-tags: OSM OpenStreetMap POI Shop
  x-version: 0.0.1